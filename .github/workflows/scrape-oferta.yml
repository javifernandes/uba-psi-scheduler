name: Scrape Oferta

on:
  workflow_dispatch:
    inputs:
      publish_mode:
        description: 'Cómo publicar cambios'
        required: true
        default: 'pr'
        type: choice
        options:
          - pr
          - commit
          - none
      operation:
        description: 'Operación'
        required: true
        default: 'scrape'
        type: choice
        options:
          - scrape
          - close_window
      force_run:
        description: 'Forzar scrape aunque esté fuera de ventana'
        required: true
        default: false
        type: boolean
      window_id:
        description: 'ID de ventana a cerrar (opcional en close_window)'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: scrape-oferta-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve execution parameters
        id: params
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            echo "publish_mode=commit" >> "$GITHUB_OUTPUT"
            echo "operation=scrape" >> "$GITHUB_OUTPUT"
            echo "force_run=false" >> "$GITHUB_OUTPUT"
            echo "trigger=schedule" >> "$GITHUB_OUTPUT"
            echo "window_id=" >> "$GITHUB_OUTPUT"
          else
            echo "publish_mode=${{ inputs.publish_mode }}" >> "$GITHUB_OUTPUT"
            echo "operation=${{ inputs.operation }}" >> "$GITHUB_OUTPUT"
            echo "force_run=${{ inputs.force_run }}" >> "$GITHUB_OUTPUT"
            echo "trigger=manual" >> "$GITHUB_OUTPUT"
            echo "window_id=${{ inputs.window_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate scrape window status
        id: status
        if: steps.params.outputs.operation == 'scrape'
        run: |
          npm run scrape:window:status -- \
            --config config/scraper-windows.json \
            --trigger "${{ steps.params.outputs.trigger }}" \
            --force "${{ steps.params.outputs.force_run }}"

      - name: Skip run outside active window
        if: steps.params.outputs.operation == 'scrape' && steps.status.outputs.should_run != 'true'
        run: |
          echo "Scrape omitido: ${{ steps.status.outputs.status_reason }}"
          echo "Ventana activa: ${{ steps.status.outputs.active_window_id }}"

      - name: Run scraper
        if: steps.params.outputs.operation == 'scrape' && steps.status.outputs.should_run == 'true'
        run: npm run scrape:catalog -- --career all

      - name: Close active window
        if: steps.params.outputs.operation == 'close_window'
        shell: bash
        run: |
          if [[ -n "${{ steps.params.outputs.window_id }}" ]]; then
            npm run scrape:window:close -- \
              --config config/scraper-windows.json \
              --window-id "${{ steps.params.outputs.window_id }}"
          else
            npm run scrape:window:close -- \
              --config config/scraper-windows.json
          fi

      - name: Prepare publication metadata
        id: publish_meta
        shell: bash
        run: |
          if [[ "${{ steps.params.outputs.operation }}" == "close_window" ]]; then
            echo "commit_message=chore(data): close scraper window" >> "$GITHUB_OUTPUT"
            echo "title=chore(data): close scraper window" >> "$GITHUB_OUTPUT"
            echo "body=Este PR cierra una ventana activa de scraping en config/scraper-windows.json." >> "$GITHUB_OUTPUT"
          else
            echo "commit_message=chore(data): refresh oferta scrape" >> "$GITHUB_OUTPUT"
            echo "title=chore(data): refresh oferta scrape" >> "$GITHUB_OUTPUT"
            echo "body=Actualización automática de oferta académica scrapeada desde UBA Psi." >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          CHANGED=$(git status --porcelain -- src/data/uba/psicologia/oferta config/scraper-windows.json)
          if [[ -z "$CHANGED" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No hay cambios para publicar."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Cambios detectados:"
            echo "$CHANGED"
          fi

      - name: Commit directly to main
        if: steps.changes.outputs.has_changes == 'true' && steps.params.outputs.publish_mode == 'commit'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/uba/psicologia/oferta config/scraper-windows.json
          git commit -m "${{ steps.publish_meta.outputs.commit_message }}"
          git push

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true' && steps.params.outputs.publish_mode == 'pr'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/auto-scrape-${{ github.run_id }}
          delete-branch: true
          commit-message: ${{ steps.publish_meta.outputs.commit_message }}
          title: ${{ steps.publish_meta.outputs.title }}
          body: ${{ steps.publish_meta.outputs.body }}
          add-paths: |
            src/data/uba/psicologia/oferta
            config/scraper-windows.json

      - name: No publish mode
        if: steps.changes.outputs.has_changes == 'true' && steps.params.outputs.publish_mode == 'none'
        run: |
          echo "publish_mode=none: cambios detectados pero no publicados."
