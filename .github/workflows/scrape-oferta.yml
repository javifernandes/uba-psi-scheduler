name: Scrape Oferta

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operación'
        required: true
        default: 'scrape'
        type: choice
        options:
          - scrape
          - close_window
      force_run:
        description: 'Forzar scrape aunque esté fuera de ventana'
        required: true
        default: false
        type: boolean
      window_id:
        description: 'ID de ventana a cerrar (opcional en close_window)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: scrape-oferta-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Evaluate scrape window status
        id: status
        if: inputs.operation == 'scrape'
        env:
          CONVEX_INGEST_URL: ${{ vars.CONVEX_INGEST_URL }}
        run: |
          npm run scrape:window:status -- \
            --trigger "manual" \
            --force "${{ inputs.force_run }}"

      - name: Skip run outside active window
        if: inputs.operation == 'scrape' && steps.status.outputs.should_run != 'true'
        run: |
          echo "Scrape omitido: ${{ steps.status.outputs.status_reason }}"
          echo "Ventana activa: ${{ steps.status.outputs.active_window_id }}"

      - name: Run scraper to temporary output
        if: inputs.operation == 'scrape' && steps.status.outputs.should_run == 'true'
        run: npm run scrape:catalog -- --career all --output-dir ./tmp/probe-data

      - name: Push probe payloads to Convex
        if: inputs.operation == 'scrape' && steps.status.outputs.should_run == 'true'
        env:
          CONVEX_INGEST_URL: ${{ vars.CONVEX_INGEST_URL }}
          VACANCY_INGEST_TOKEN: ${{ secrets.VACANCY_INGEST_TOKEN }}
        run: |
          npm run probe:push-convex -- \
            --input-dir ./tmp/probe-data \
            --source-run-id "gha:${{ github.run_id }}:${{ github.run_attempt }}" \
            --captured-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Close active window in Convex
        if: inputs.operation == 'close_window'
        env:
          CONVEX_INGEST_URL: ${{ vars.CONVEX_INGEST_URL }}
          CONVEX_ADMIN_TOKEN: ${{ secrets.CONVEX_ADMIN_TOKEN }}
          VACANCY_INGEST_TOKEN: ${{ secrets.VACANCY_INGEST_TOKEN }}
        run: |
          if [[ -n "${{ inputs.window_id }}" ]]; then
            npm run scrape:window:close -- --window-id "${{ inputs.window_id }}"
          else
            npm run scrape:window:close
          fi
